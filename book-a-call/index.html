<!DOCTYPE html>
<html lang="en">
<head>

  <meta property="og:description" content="30 minutes with Jordan or Laura. Bring one specific pattern your team keeps running into. We'll show you what's underneath, and what an intervention would look like.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="300x300" href="../files/favicon-300.png">
  <link rel="icon" type="image/png" sizes="150x150" href="../files/favicon-150.png">

  <!-- auth-gate.js conditionally injects the review-widget for allow-listed
       team members; public visitors see no widget references in source. -->
  <script src="../auth-gate.js" defer></script>

  <style>
    :root {
      --tgg-purple: #8705E4;
      --tgg-purple-darker: #6804B5;
      --tgg-navy: #01055E;
      --tgg-sky: #53DEFF;
      --tgg-off-white: #F5F5F5;
      --tgg-ink: #41505A;
      --tgg-ink-muted: #7E8C9F;
      --tgg-hairline: #CDDCDF;
      --tgg-tint-cream: #EFF5F7;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Open Sans', system-ui, sans-serif;
      --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      line-height: 1.55;
      color: var(--tgg-ink);
      /* Backdrop — purple/navy gradient that recalls the home hero, with a
         dark-overlay treatment so the page reads as a modal-over-something. */
      background:
        linear-gradient(180deg, rgba(1,5,94,0.78), rgba(1,5,94,0.92)),
        linear-gradient(135deg, var(--tgg-purple), var(--tgg-navy));
      background-attachment: fixed;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding: 2rem 1rem 3rem;
    }

    /* ---------- Modal card ---------- */
    .modal-card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      animation: modalEnter 0.35s var(--ease-out) both;
    }
    @keyframes modalEnter {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* ---------- Modal header (brand + close) ---------- */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.25rem 0.85rem;
      border-bottom: 1px solid var(--tgg-hairline);
    }
    .modal-brand {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .modal-brand img { height: 40px; width: auto; }
    .modal-close {
      background: transparent;
      border: 0;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--tgg-ink-muted);
      transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out);
      padding: 0;
    }
    .modal-close:hover { background: var(--tgg-tint-cream); color: var(--tgg-purple); }
    .modal-close:focus-visible {
      outline: 2px solid var(--tgg-purple);
      outline-offset: 2px;
    }
    .modal-close svg { width: 20px; height: 20px; fill: currentColor; }

    /* ---------- Modal hero ---------- */
    .modal-hero {
      padding: 2.25rem 2rem 1.5rem;
      text-align: center;
    }
    .modal-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(1.9rem, 4.5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--tgg-purple);
      letter-spacing: -0.01em;
      margin-bottom: 0.85rem;
    }
    .modal-hero p.sub {
      font-size: 1.05rem;
      max-width: 540px;
      margin: 0 auto;
      color: var(--tgg-ink);
      line-height: 1.5;
    }

    /* ---------- Calendly embed inside the modal ---------- */
    .modal-calendar {
      padding: 0.5rem 0.75rem 1rem;
    }
    .calendly-inline-widget {
      min-width: 320px;
      /* Sized to accommodate Calendly's tallest internal view (the booking
         form after picking a time) without internal scroll. */
      height: 1050px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: var(--tgg-tint-cream);
    }
    @media (max-width: 800px) {
      .calendly-inline-widget { height: 1180px; }
    }

    /* ---------- Mobile ---------- */
    @media (max-width: 600px) {
      body { padding: 0.75rem 0.5rem 1.5rem; }
      .modal-card { border-radius: 12px; }
      .modal-header { padding: 0.85rem 1rem 0.7rem; }
      .modal-brand img { height: 32px; }
      .modal-hero { padding: 1.5rem 1.25rem 1rem; }
      .modal-calendar { padding: 0.25rem 0.4rem 0.75rem; }
    }
  </style>
</head>
<body>

  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- ===== Modal header: brand + close ===== -->
    <header class="modal-header">
      <a class="modal-brand" href="../" aria-label="Back to Glinda home">
        <img src="../files/logo.svg" alt="The Glinda Group">
      </a>
      <button
        type="button"
        class="modal-close"
        aria-label="Close"
        id="modal-close-btn"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.3 5.71L12 12.01l-6.3-6.3-1.4 1.41 6.29 6.29-6.29 6.29 1.4 1.41 6.3-6.29 6.3 6.29 1.41-1.41-6.29-6.29 6.29-6.29z"></path>
        </svg>
      </button>
    </header>

    <!-- ===== Hero copy ===== -->
    <section class="modal-hero">
      <h1 id="modal-title">Tell us where it hurts.</h1>
      <p class="sub">30 minutes with Jordan or Laura. Bring one specific pattern your team keeps running into. We'll show you what's likely underneath — and what an intervention would look like for your context.</p>
    </section>

    <!-- ===== Calendly inline embed ===== -->
    <section class="modal-calendar" id="schedule">
      <!-- Calendly inline widget begin -->
      <div
        class="calendly-inline-widget"
        data-url="https://calendly.com/d/dzzp-tx7-qp3/see-what-s-possible-with-glinda?primary_color=8705e4&text_color=01055e&background_color=ffffff&hide_landing_page_details=1"
      ></div>
      <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
      <!-- Calendly inline widget end -->
    </section>

  </div>

  <!-- ===== UTM passthrough (forwards utm_* onto the Calendly embed URL) ===== -->
  <script>
    (function () {
      var UTM_KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];

      function readUtmFromUrl() {
        var bundle = {};
        var params = new URLSearchParams(window.location.search);
        UTM_KEYS.forEach(function (k) {
          var v = params.get(k);
          if (v) bundle[k] = v;
        });
        return bundle;
      }
      function readUtmFromSession() {
        var bundle = {};
        UTM_KEYS.forEach(function (k) {
          try {
            var v = sessionStorage.getItem(k);
            if (v) bundle[k] = v;
          } catch (e) {}
        });
        return bundle;
      }
      function persistUtm(bundle) {
        Object.keys(bundle).forEach(function (k) {
          try { sessionStorage.setItem(k, bundle[k]); } catch (e) {}
        });
      }

      var fromUrl     = readUtmFromUrl();
      var fromSession = readUtmFromSession();
      var bundle = Object.assign({}, fromSession, fromUrl);
      persistUtm(fromUrl);

      var widget = document.querySelector('.calendly-inline-widget');
      if (!widget) return;
      var url = widget.getAttribute('data-url');
      if (!url) return;

      var keys = Object.keys(bundle);
      if (keys.length === 0) return;

      var sep = url.indexOf('?') >= 0 ? '&' : '?';
      var extra = keys.map(function (k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(bundle[k]);
      }).join('&');
      widget.setAttribute('data-url', url + sep + extra);
    })();
  </script>

  <!-- ===== Close-button behavior ===== -->
  <script>
    (function () {
      var btn = document.getElementById('modal-close-btn');
      if (!btn) return;

      function dismiss() {
        // Prefer history back if the user came from another site page —
        // returns them to whatever they were reading. Otherwise fall back
        // to the home page.
        if (window.history.length > 1 && document.referrer &&
            document.referrer.indexOf(window.location.host) !== -1) {
          window.history.back();
        } else {
          window.location.href = '../';
        }
      }
      btn.addEventListener('click', dismiss);

      // Escape key also closes.
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') dismiss();
      });

      // Clicking the backdrop (outside the modal card) also closes.
      document.body.addEventListener('click', function (e) {
        if (e.target === document.body) dismiss();
      });
    })();
  </script>

</body>
</html>
