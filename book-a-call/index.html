<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Book a call · The Glinda Group</title>
  <meta name="description" content="30 minutes with Jordan or Laura. Bring one specific pattern your team keeps running into. We'll show you what's underneath.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://engage.glindagroup.com/book-a-call/">
  <meta property="og:title" content="Book a call · The Glinda Group">
  <meta property="og:description" content="30 minutes with Jordan or Laura. Bring one specific pattern your team keeps running into. We'll show you what's underneath.">
  <meta property="og:image" content="https://engage.glindagroup.com/files/og-home.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="The Glinda Group">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Book a call · The Glinda Group">
  <meta name="twitter:description" content="30 minutes with Jordan or Laura. Bring one specific pattern your team keeps running into. We'll show you what's underneath.">
  <meta name="twitter:image" content="https://engage.glindagroup.com/files/og-home.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="300x300" href="../files/favicon-300.png">
  <link rel="icon" type="image/png" sizes="150x150" href="../files/favicon-150.png">

  <script src="../auth-gate.js" defer></script>

  <style>
    :root {
      --tgg-purple: #8705E4;
      --tgg-purple-darker: #6804B5;
      --tgg-navy: #01055E;
      --tgg-sky: #53DEFF;
      --tgg-off-white: #F5F5F5;
      --tgg-ink: #41505A;
      --tgg-ink-muted: #7E8C9F;
      --tgg-hairline: #CDDCDF;
      --tgg-tint-cream: #EFF5F7;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Open Sans', system-ui, sans-serif;
      --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: var(--font-body);
      line-height: 1.5;
      color: var(--tgg-ink);
      background: #fff;
      -webkit-font-smoothing: antialiased;
      /* dvh so iOS address-bar collapse doesn't break the layout */
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Header (logo + close) ---------- */
    .modal-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--tgg-hairline);
      background: #fff;
      /* Stick to top of viewport so the close X is always reachable
         when the page is scrolled. */
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .modal-brand { display: flex; align-items: center; text-decoration: none; }
    .modal-brand img { height: 40px; width: auto; }
    .modal-close {
      background: transparent;
      border: 0;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--tgg-ink-muted);
      transition: background 0.15s var(--ease-out), color 0.15s var(--ease-out);
      padding: 0;
    }
    .modal-close:hover { background: var(--tgg-tint-cream); color: var(--tgg-purple); }
    .modal-close:focus-visible {
      outline: 2px solid var(--tgg-purple);
      outline-offset: 2px;
    }
    .modal-close svg { width: 20px; height: 20px; fill: currentColor; }

    /* ---------- Intro row (body text, single line where possible) ---------- */
    .modal-intro {
      flex: 0 0 auto;
      padding: 0.85rem 1.5rem;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--tgg-ink);
      border-bottom: 1px solid var(--tgg-hairline);
    }
    .modal-intro strong {
      color: var(--tgg-purple);
      font-weight: 600;
    }

    /* ---------- Calendly section ----------
       Grows to fill all remaining viewport space after header + intro. */
    .modal-calendar {
      flex: 1 1 auto;
      min-height: 0;
      padding: 0.5rem 1rem 0.75rem;
      display: flex;
      overflow: hidden;
    }
    .calendly-inline-widget {
      width: 100%;
      min-width: 320px;
      flex: 1 1 auto;
      border-radius: 8px;
      overflow: hidden;
    }

    /* ---------- Mobile compaction ----------
       Shorter hero / smaller logo so Calendly has more room.
       The viewport-fit=cover meta + safe-area-inset padding stops
       iOS from clipping under the home indicator. */
    @media (max-width: 640px) {
      .modal-header {
        padding: 0.55rem 0.85rem;
        padding-top: max(0.55rem, env(safe-area-inset-top));
      }
      .modal-brand img { height: 30px; }
      .modal-close { width: 32px; height: 32px; }
      .modal-intro {
        padding: 0.6rem 0.85rem;
        font-size: 0.88rem;
        line-height: 1.4;
      }
      .modal-calendar {
        padding: 0.35rem 0.5rem;
        padding-bottom: max(0.35rem, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>

  <header class="modal-header">
    <a class="modal-brand" href="../" aria-label="Back to Glinda home">
      <img src="../files/logo.svg" alt="The Glinda Group">
    </a>
    <button
      type="button"
      class="modal-close"
      aria-label="Close"
      id="modal-close-btn"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18.3 5.71L12 12.01l-6.3-6.3-1.4 1.41 6.29 6.29-6.29 6.29 1.4 1.41 6.3-6.29 6.3 6.29 1.41-1.41-6.29-6.29 6.29-6.29z"></path>
      </svg>
    </button>
  </header>

  <p class="modal-intro">
    <strong>Tell us where it hurts:</strong> 30 minutes with Jordan or Laura. Bring one specific pattern your team keeps running into.
  </p>

  <section class="modal-calendar" id="schedule">
    <div
      class="calendly-inline-widget"
      data-url="https://calendly.com/d/dzzp-tx7-qp3/see-what-s-possible-with-glinda?primary_color=8705e4&text_color=01055e&background_color=ffffff&hide_landing_page_details=1&hide_gdpr_banner=1"
    ></div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
  </section>

  <!-- UTM passthrough -->
  <script>
    (function () {
      var UTM_KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
      function readUtmFromUrl() {
        var bundle = {}, params = new URLSearchParams(window.location.search);
        UTM_KEYS.forEach(function (k) { var v = params.get(k); if (v) bundle[k] = v; });
        return bundle;
      }
      function readUtmFromSession() {
        var bundle = {};
        UTM_KEYS.forEach(function (k) {
          try { var v = sessionStorage.getItem(k); if (v) bundle[k] = v; } catch (e) {}
        });
        return bundle;
      }
      function persistUtm(bundle) {
        Object.keys(bundle).forEach(function (k) {
          try { sessionStorage.setItem(k, bundle[k]); } catch (e) {}
        });
      }
      var fromUrl = readUtmFromUrl(), fromSession = readUtmFromSession();
      var bundle = Object.assign({}, fromSession, fromUrl);
      persistUtm(fromUrl);
      var widget = document.querySelector('.calendly-inline-widget');
      if (!widget) return;
      var url = widget.getAttribute('data-url');
      if (!url) return;
      var keys = Object.keys(bundle);
      if (keys.length === 0) return;
      var sep = url.indexOf('?') >= 0 ? '&' : '?';
      var extra = keys.map(function (k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(bundle[k]);
      }).join('&');
      widget.setAttribute('data-url', url + sep + extra);
    })();
  </script>

  <!-- Close button + Escape -->
  <script>
    (function () {
      var btn = document.getElementById('modal-close-btn');
      if (!btn) return;
      function dismiss() {
        if (window.history.length > 1 && document.referrer &&
            document.referrer.indexOf(window.location.host) !== -1) {
          window.history.back();
        } else {
          window.location.href = '../';
        }
      }
      btn.addEventListener('click', dismiss);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') dismiss();
      });
    })();
  </script>

</body>
</html>
