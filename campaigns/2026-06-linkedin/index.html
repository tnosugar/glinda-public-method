<style>
  /* LinkedIn-ish palette */
  :root {
    --li-bg: #f4f2ee;
    --li-card: #ffffff;
    --li-blue: #0a66c2;
    --li-blue-dark: #004182;
    --li-text: #38434f;
    --li-text-muted: #5e6b78;
    --li-border: #e0dfdc;
    --li-divider: #e9e5df;
    --li-hover: #f3f2ef;
    --li-link-preview-bg: #eef3f8;

    /* Glinda brand for the filter bar */
    --tgg-purple: #8705E4;
    --tgg-navy: #01055E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--li-bg);
    color: var(--li-text);
    line-height: 1.43;
    font-size: 14px;
    padding: 0;
    margin: 0;
  }
  .topbar {
    background: linear-gradient(135deg, var(--tgg-purple), var(--tgg-navy));
    color: #fff;
    padding: 1.5rem 1.5rem 1.25rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .topbar .wrap { max-width: 720px; margin: 0 auto; }
  .topbar h1 { font-family: 'Source Sans 3', sans-serif; font-size: 1.45rem; font-weight: 700; margin-bottom: 0.3rem; letter-spacing: -0.01em; }
  .topbar p { font-size: 0.95rem; opacity: 0.9; margin-bottom: 0.85rem; }

  .filters { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 0.85rem; }
  .filter-group { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
  .filter-group .label {
    color: #fff; opacity: 0.7;
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 0.35rem;
  }
  .chip {
    background: rgba(255,255,255,0.10);
    color: #fff; font-size: 0.8rem;
    padding: 0.28rem 0.7rem;
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-weight: 500;
  }
  .chip:hover { background: rgba(255,255,255,0.18); }
  .chip.active { background: #fff; color: var(--tgg-purple); border-color: #fff; font-weight: 600; }
  .filter-group + .filter-group { margin-left: 0.6rem; padding-left: 0.6rem; border-left: 1px solid rgba(255,255,255,0.2); }

  .feed { max-width: 552px; margin: 1.5rem auto 4rem; padding: 0 0.75rem; }

  .post-card {
    background: var(--li-card);
    border-radius: 8px;
    border: 1px solid var(--li-border);
    margin-bottom: 0.85rem;
    overflow: hidden;
    transition: opacity 0.15s;
  }
  .post-card.hidden { display: none; }

  .post-head {
    display: flex; align-items: flex-start;
    padding: 0.8rem 1rem 0.5rem;
  }
  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
    margin-right: 0.6rem;
    background: var(--li-divider);
    display: flex; align-items: center; justify-content: center;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar.company {
    border-radius: 4px;
    background: linear-gradient(135deg, var(--tgg-purple), var(--tgg-navy));
    color: #fff; font-weight: 700;
  }
  .avatar.company img { width: 70%; height: auto; }

  .head-text { flex: 1; min-width: 0; }
  .head-name {
    font-weight: 700; color: var(--li-text);
    font-size: 0.92rem; line-height: 1.25;
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .head-name .badge { color: var(--li-blue); }
  .head-headline {
    color: var(--li-text-muted);
    font-size: 0.75rem; line-height: 1.3;
    margin-top: 0.1rem;
    max-height: 1.7em; overflow: hidden;
  }
  .head-time {
    color: var(--li-text-muted);
    font-size: 0.72rem; margin-top: 0.15rem;
  }

  .post-body {
    padding: 0.25rem 1rem 0.75rem;
    font-size: 0.92rem;
    color: var(--li-text);
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .post-body .hook {
    font-weight: 700;
    display: block;
    margin-bottom: 0.4rem;
  }
  .post-body p { margin-bottom: 0.5rem; }
  .post-body p:last-child { margin-bottom: 0; }

  .link-preview {
    display: block;
    text-decoration: none;
    color: var(--li-text);
    background: var(--li-link-preview-bg);
    border-top: 1px solid var(--li-divider);
    border-bottom: 1px solid var(--li-divider);
    overflow: hidden;
    margin: 0.25rem 0;
  }
  .link-preview:hover { background: #e3edf6; }
  .link-preview .lp-image {
    width: 100%; aspect-ratio: 1200 / 630;
    background: linear-gradient(135deg, var(--tgg-purple), var(--tgg-navy)) center/cover no-repeat;
    background-size: cover;
    display: block;
  }
  .link-preview .lp-meta { padding: 0.7rem 1rem 0.85rem; }
  .link-preview .lp-title { font-weight: 600; font-size: 0.95rem; color: var(--li-text); line-height: 1.35; margin-bottom: 0.25rem; }
  .link-preview .lp-desc { font-size: 0.8rem; color: var(--li-text-muted); line-height: 1.4; max-height: 2.7em; overflow: hidden; }
  .link-preview .lp-url { font-size: 0.72rem; color: var(--li-text-muted); margin-top: 0.4rem; text-transform: lowercase; letter-spacing: 0.01em; }

  .post-stats {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.55rem 1rem 0.4rem;
    font-size: 0.78rem;
    color: var(--li-text-muted);
    border-top: 0;
  }
  .post-stats .reactions { display: flex; align-items: center; gap: 0.3rem; }
  .reaction-dots {
    display: inline-flex; align-items: center;
  }
  .reaction-dots .dot {
    width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid #fff;
    display: inline-block;
    margin-left: -4px;
  }
  .reaction-dots .dot:first-child { margin-left: 0; }
  .dot.r-like { background: var(--li-blue); }
  .dot.r-celebrate { background: #6dae4f; }
  .dot.r-insight { background: #c37d16; }

  .post-actions {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    border-top: 1px solid var(--li-divider);
  }
  .post-action {
    display: flex; align-items: center; justify-content: center;
    gap: 0.4rem;
    padding: 0.65rem 0.5rem;
    color: var(--li-text-muted);
    font-size: 0.82rem; font-weight: 600;
    cursor: pointer;
    transition: background 0.1s;
  }
  .post-action:hover { background: var(--li-hover); }
  .post-action svg { width: 18px; height: 18px; fill: currentColor; }

  /* Section divider between LPs in feed */
  .lp-divider {
    text-align: center;
    color: var(--li-text-muted);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 1.5rem 0 0.85rem;
    font-weight: 600;
  }
  .lp-divider::before, .lp-divider::after {
    content: ''; display: inline-block; width: 2.5rem; height: 1px; background: var(--li-border); vertical-align: middle; margin: 0 0.6rem;
  }
  .lp-divider.hidden { display: none; }

  .empty-state {
    text-align: center;
    color: var(--li-text-muted);
    padding: 4rem 1rem;
  }

  @media (max-width: 600px) {
    .topbar { padding: 1.25rem 1rem 1rem; }
    .topbar h1 { font-size: 1.2rem; }
    .feed { padding: 0 0.5rem; }
    .filter-group + .filter-group { margin-left: 0; padding-left: 0; border-left: 0; width: 100%; margin-top: 0.4rem; }
  }

  body.page-locked .topbar,
  body.page-locked .feed { visibility: hidden; }
  body.page-locked::before {
    content: 'Checking sign-in…';
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--li-bg, #f4f2ee);
    color: var(--li-text-muted, #5e6b78);
    font-size: 1rem;
    font-family: 'Source Sans 3', system-ui, sans-serif;
    z-index: 9999;
  }
  .topbar-auth {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 0.6rem;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 0.4rem;
  }
  .topbar-auth .email { color: #fff; font-weight: 500; }
  .topbar-auth a { color: rgba(255,255,255,0.85); text-decoration: underline; }
  .topbar-auth a:hover { color: #fff; }

</style>

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAC3f0IH9-s7XU9fTE3jbk7Bhfn20uTIdY",

    databaseURL:       "https://glinda-website-default-rtdb.firebaseio.com",
    projectId:         "glinda-website",
    storageBucket:     "glinda-website.firebasestorage.app",
    messagingSenderId: "244199801855",
    appId:             "1:244199801855:web:82838197aab888d894ddca",
    measurementId:     "G-R8YJ0J0FC2"
  };
  const ALLOWLIST = [
    'jordan@glindagroup.com',
    'laura@glindagroup.com',
    'milos.milosavljevic@glindagroup.com',
    'milos.milosavljevic@nsc.agency',
    'team@2-human.com'
  ];

  const app  = getApps().length ? getApp() : initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    const email = ((user && user.email) || '').toLowerCase();
    if (!user || !ALLOWLIST.includes(email)) {
      window.location.replace('../../login/');
      return;
    }
    document.body.classList.remove('page-locked');
    const el = document.getElementById('signed-in-email');
    if (el) el.textContent = email;
  });
</script>

        "Smaller teams create stronger identities. It's like steroids for silos. We designed Collaboration Nation to break that through shared problem-solving.",
      ],
    },

    // 6. leadership-totmty
    {
      lp: 'leadership-totmty', author: 'jb',
      hook: 'People get promoted because they execute. Then they keep executing.',
      body: [
        'This is the trap of combining advancement with leadership. The best doers are rarely the best leaders. They have to be taught.',
        "But it's hard to learn when they're still busy executing. Meanwhile, the team falters.",
        'We teach it in a 52-week nudge program: weekly emails + monthly 29-minute talks. Leadership Tax On Me.',
      ],
    },
    {
      lp: 'leadership-totmty', author: 'lm',
      hook: 'People get promoted to leadership because they know how to execute, not because they know how to lead.',
      body: [
        "That's why we created Leadership Tax On Me. Twelve monthly 29-minute sessions followed by three weekly nudge emails to keep concepts top of mind.",
        'Leaders are promoted due to their skill in execution — not in leadership.',
        'So we created Leadership Tax On Me: monthly 29-minute presentations and weekly nudge emails to keep concepts top of mind. First we get leaders to want to improve. Then we show them how.',
      ],
    },
    {
      lp: 'leadership-totmty', author: 'gg',
      hook: 'Why does your leadership pipeline keep producing the same gap?',
      body: [
        "Because the people you're promoting were measured on execution, then asked to lead. Different skill, no transition.",
        'We built Leadership Tax On Me to close it: a 52-week behavior-change architecture. Twelve monthly 29-minute talks, weekly nudge emails between. The leader learns leadership while doing leadership.',
        'Not a training course. A habit-forming system. Science + Whimsy applied to the most consequential promotion in your org.',
      ],
    },

    // 7. attitudes-safetydance
    {
      lp: 'attitudes-safetydance', author: 'jb',
      hook: 'Cynicism is the most expensive attitude in your org.',
      body: [
        'First, we get your leaders to want to improve. Then we show them how.',
        'If you want to change an attitude, you have to change a belief. But it takes listening to know what the mistaken belief is.',
        'Sometimes the belief is wrong and is ripe for changing. Sometimes the belief is correct, meaning that something else in the environment must change.',
      ],
    },
    {
      lp: 'attitudes-safetydance', author: 'lm',
      hook: "Attitudes are equations. Values times beliefs equals attitudes. Values don't change.",
      body: [
        "You can't argue someone out of an attitude. You must surface and address the underlying belief. We do it with our tool The Safety Dance, which makes the surfacing anonymous and real-time.",
        'A cynical attitude reflects an underlying belief that the face value of the underlying subject is false.',
        'If the belief is wrong, correct it. If the belief is right, address it.',
      ],
    },
    {
      lp: 'attitudes-safetydance', author: 'gg',
      hook: "You can't change people's values, but you can change their beliefs.",
      body: [
        "But the real work lies in surfacing the belief. That's why we created The Safety Dance, an AI tool that allows for real-time, anonymous feedback.",
        "Because attitudes are equations. Values times beliefs equals attitudes. Since values don't change, there's only one way to change an attitude.",
        'We surface those beliefs, anonymously, in real time, to bring the real solutions into clear view. Update the belief, or update the reality.',

  // ============================================================
  // RENDER
  // ============================================================

  const ICONS = {
    like:    '<svg viewBox="0 0 24 24"><path d="M19.46 11l-3.91-3.91a7 7 0 01-1.69-2.74l-.49-1.47A2.76 2.76 0 0010.76 1 2.75 2.75 0 008 3.74v1.12a9.19 9.19 0 00.46 2.85L8.89 9H4.12a2.12 2.12 0 00-2 2.5l1.34 7a2.12 2.12 0 002 1.5h11.10a4.31 4.31 0 003.21-1.43l1.39-1.39A2.12 2.12 0 0019.46 11z"/></svg>',
    comment: '<svg viewBox="0 0 24 24"><path d="M7 9h10v1H7zm0 4h7v-1H7zm16-2a6.78 6.78 0 01-2.84 5.61L12 22v-4H8a7 7 0 01-7-7V8a7 7 0 017-7h8a7 7 0 017 7zM21 8a5 5 0 00-5-5H8a5 5 0 00-5 5v3a5 5 0 005 5h6v2.31L19 15a4.79 4.79 0 002-4z"/></svg>',
    repost:  '<svg viewBox="0 0 24 24"><path d="M14 15v3h6v-2h-4v-1h-2zM4 15h2v3H4v-3zm8-7v3h-2V8H4V6h6V5l2 1.5L10 8h2v0zm6 4v2H4v-2h14z"/></svg>',
    send:    '<svg viewBox="0 0 24 24"><path d="M21 3L2 9.5l8 2.5 2.5 8L21 3z"/></svg>',
  };

  // Workshop slug → utm_term
  const WORKSHOP_TERMS = {
    'goals-trial':                   'trial_method',
    'decisions-jadm':                'jadm_session',
    'underperformance-superfriends': 'super_friends',
    'culture-cultureclub':           'culture_club',
    'silos-collaborationnation':     'collaboration_nation',
    'leadership-totmty':             'leadership_tax_on_me',
    'attitudes-safetydance':         'safety_dance',
  };

  function buildUrl(lp, author) {
    // Note: utm_content=post_boost is the same across all 3 voices per LP.
    // Author-level attribution (utm_content=jb|lm|gg) was removed when we
    // switched to the boosted-post UTM scheme on 2026-06-10.
    const base = LPS[lp].urlBase;
    return base + '?utm_source=linkedin&utm_medium=social&utm_campaign=engage_glinda&utm_content=post_boost&utm_term=' + WORKSHOP_TERMS[lp];
  }

  function renderCard(post) {
    const a = AUTHORS[post.author];
    const l = LPS[post.lp];
    const url = buildUrl(post.lp, post.author);
    const hostname = 'engage.glindagroup.com';

    const card = document.createElement('article');
    card.className = 'post-card';
    card.dataset.author = post.author;
    card.dataset.lp = post.lp;

    const avatarHtml = a.isCompany
      ? `<div class="avatar company"><img src="${a.avatar}" alt=""></div>`
      : `<div class="avatar"><img src="${a.avatar}" alt="${a.name}"></div>`;

    const bodyHtml = post.body.map(p => `<p>${escapeHtml(p)}</p>`).join('');

    // Realistic-looking engagement numbers
    const reactions = randomBetween(28, 187);
    const comments  = randomBetween(3, 24);
    const reposts   = randomBetween(0, 9);

    card.innerHTML = `
      <div class="post-head">
        ${avatarHtml}
        <div class="head-text">
          <div class="head-name">
            ${escapeHtml(a.name)}
            ${a.verified ? '<span class="badge" title="Verified company">✓</span>' : ''}
          </div>
          <div class="head-headline">${escapeHtml(a.headline)}</div>
          <div class="head-time">${a.time} · 🌐</div>
        </div>
      </div>

      <div class="post-body">
        <span class="hook">${escapeHtml(post.hook)}</span>
        ${bodyHtml}
      </div>

      <a class="link-preview" href="${url}" target="_blank" rel="noopener">
        <div class="lp-image" style="background-image:url('${l.ogImage}')"></div>
        <div class="lp-meta">
          <div class="lp-title">${escapeHtml(l.ogTitle)}</div>
          <div class="lp-desc">${escapeHtml(l.ogDesc)}</div>
          <div class="lp-url">${hostname}</div>
        </div>
      </a>

      <div class="post-stats">
        <div class="reactions">
          <span class="reaction-dots">
            <span class="dot r-like"></span>
            <span class="dot r-celebrate"></span>
            <span class="dot r-insight"></span>
          </span>
          <span>${reactions}</span>
        </div>
        <div>${comments} comments · ${reposts} reposts</div>
      </div>

      <div class="post-actions">
        <div class="post-action">${ICONS.like} Like</div>
        <div class="post-action">${ICONS.comment} Comment</div>
        <div class="post-action">${ICONS.repost} Repost</div>
        <div class="post-action">${ICONS.send} Send</div>
      </div>
    `;
    return card;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function randomBetween(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function render() {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    // Group by LP for dividers, but show all
    const lps = Object.keys(LPS);
    for (const lp of lps) {
      const divider = document.createElement('div');
      divider.className = 'lp-divider';
      divider.dataset.lp = lp;
      divider.textContent = LPS[lp].label + ' — /' + lp + '/';
      feed.appendChild(divider);

      const lpPosts = POSTS.filter(p => p.lp === lp);
      for (const post of lpPosts) {
        feed.appendChild(renderCard(post));
      }
    }
  }

  function applyFilters() {
    const author = document.querySelector('.chip.active[data-filter="author"]').dataset.value;
    const lp = document.querySelector('.chip.active[data-filter="lp"]').dataset.value;

    const cards = document.querySelectorAll('.post-card');
    cards.forEach(c => {
      const matchAuthor = (author === 'all' || c.dataset.author === author);
      const matchLp     = (lp === 'all' || c.dataset.lp === lp);
      c.classList.toggle('hidden', !(matchAuthor && matchLp));
    });

    // Hide LP dividers when no posts for that LP remain visible
    const dividers = document.querySelectorAll('.lp-divider');
    dividers.forEach(d => {
      const dlp = d.dataset.lp;
      if (lp !== 'all' && lp !== dlp) {
        d.classList.add('hidden');
        return;
      }
      d.classList.remove('hidden');
    });
  }

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const group = chip.dataset.filter;
      document.querySelectorAll(`.chip[data-filter="${group}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      applyFilters();
    });
  });

  render();
</script>

</body>
